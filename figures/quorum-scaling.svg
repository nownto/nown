<svg viewBox="0 0 680 360" role="img" aria-label="As the network grows, the quorum grows and the cost to swing a verdict climbs out of reach." xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
  <style>
    .axis{ stroke:var(--ink-3,#726c60); stroke-width:1.3 }
    .cost{ fill:none; stroke:var(--ink,#1b1a16); stroke-width:2.6 }
    .quor{ fill:none; stroke:var(--bronze,#9c7635); stroke-width:2.4 }
    .lbl{ font-family:var(--serif,Georgia,serif); font-size:13.5px; font-style:italic }
    .ax{ font-family:var(--serif,Georgia,serif); font-size:13px; fill:var(--ink-3,#726c60) }
    .dot{ fill:var(--ink,#1b1a16) }
  </style>

  <!-- axes -->
  <line class="axis" x1="70" y1="52" x2="70" y2="300"/>
  <line class="axis" x1="70" y1="300" x2="628" y2="300"/>
  <polygon class="dot" points="70,44 66,54 74,54"/>
  <polygon class="dot" points="636,300 626,296 626,304"/>
  <text x="350" y="336" class="ax" text-anchor="middle">network size (keys) &#8594;</text>
  <text x="40" y="180" class="ax" transform="rotate(-90 40 180)" text-anchor="middle">&#8594; larger</text>

  <!-- cost to swing a verdict: super-linear -->
  <path class="cost" d="M70,288 C300,282 470,214 620,72"/>
  <text x="612" y="66" class="lbl" fill="var(--ink,#1b1a16)" text-anchor="end">cost to swing a verdict</text>

  <!-- quorum size: gentle rise -->
  <path class="quor" d="M70,272 C210,238 400,214 620,198"/>
  <text x="612" y="216" class="lbl" fill="var(--bronze,#9c7635)" text-anchor="end">quorum seats</text>
</svg>
