<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210" font-family="Menlo, Consolas, monospace">
  <defs>
    <marker id="commit-first-timeline-arrowP3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6" fill="none" stroke="#726c60" stroke-width="1.4"/>
    </marker>
  </defs>

  <!-- boxes -->
  <rect x="42"  y="64" width="96" height="40" rx="2" fill="none" stroke="#1b1a16" stroke-width="1.4"/>
  <rect x="165" y="64" width="96" height="40" rx="2" fill="none" stroke="#1b1a16" stroke-width="1.4" stroke-dasharray="5 3"/>
  <rect x="288" y="64" width="96" height="40" rx="2" fill="none" stroke="#1b1a16" stroke-width="1.4"/>
  <rect x="411" y="64" width="96" height="40" rx="2" fill="none" stroke="#1b1a16" stroke-width="1.4"/>
  <rect x="534" y="64" width="96" height="40" rx="2" fill="none" stroke="#1b1a16" stroke-width="1.4"/>

  <!-- box labels -->
  <text x="90"  y="88" font-size="13" fill="#1b1a16" text-anchor="middle">opened</text>
  <text x="213" y="88" font-size="13" fill="#1b1a16" text-anchor="middle">exhibits sealed</text>
  <text x="336" y="88" font-size="13" fill="#1b1a16" text-anchor="middle">file fixed</text>
  <text x="459" y="88" font-size="13" fill="#1b1a16" text-anchor="middle">quorum drawn</text>
  <text x="582" y="88" font-size="13" fill="#1b1a16" text-anchor="middle">verdict</text>

  <!-- ticks from box bottoms to baseline -->
  <line x1="90"  y1="104" x2="90"  y2="150" stroke="#726c60" stroke-width="1.4"/>
  <line x1="213" y1="104" x2="213" y2="150" stroke="#726c60" stroke-width="1.4"/>
  <line x1="336" y1="104" x2="336" y2="150" stroke="#726c60" stroke-width="1.4"/>
  <line x1="459" y1="104" x2="459" y2="150" stroke="#726c60" stroke-width="1.4"/>
  <line x1="582" y1="104" x2="582" y2="150" stroke="#726c60" stroke-width="1.4"/>

  <!-- time baseline -->
  <line x1="30" y1="150" x2="615" y2="150" stroke="#726c60" stroke-width="1.4" marker-end="url(#commit-first-timeline-arrowP3)"/>
  <text x="612" y="170" font-size="12" fill="#726c60" text-anchor="end">settlement</text>

  <!-- bronze divider: seal before draw -->
  <line x1="398" y1="40" x2="398" y2="132" stroke="#825f27" stroke-width="1.4"/>
  <text x="398" y="30" font-size="13" fill="#825f27" text-anchor="middle">seal before draw</text>
</svg>