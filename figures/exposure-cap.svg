<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Menlo, Consolas, monospace">
  <!-- baseline -->
  <line x1="90" y1="260" x2="560" y2="260" stroke="#726c60" stroke-width="1.4"/>

  <!-- stacked exposure bar (primary) -->
  <rect x="120" y="218" width="100" height="42" fill="none" stroke="#1b1a16" stroke-width="1.4" rx="2"/>
  <rect x="120" y="176" width="100" height="42" fill="none" stroke="#1b1a16" stroke-width="1.4" rx="2"/>
  <rect x="120" y="134" width="100" height="42" fill="none" stroke="#1b1a16" stroke-width="1.4" rx="2"/>
  <text x="170" y="239" font-size="13" fill="#1b1a16" text-anchor="middle" dominant-baseline="middle">deal 1</text>
  <text x="170" y="197" font-size="13" fill="#1b1a16" text-anchor="middle" dominant-baseline="middle">deal 2</text>
  <text x="170" y="155" font-size="13" fill="#1b1a16" text-anchor="middle" dominant-baseline="middle">deal 3</text>

  <!-- proposed opening (dashed = not yet) -->
  <rect x="120" y="92" width="100" height="42" fill="none" stroke="#1b1a16" stroke-width="1.4" stroke-dasharray="5 3" rx="2"/>
  <text x="170" y="113" font-size="13" fill="#1b1a16" text-anchor="middle" dominant-baseline="middle">deal 4</text>

  <!-- bronze bond ceiling (the one element) -->
  <line x1="90" y1="118" x2="470" y2="118" stroke="#825f27" stroke-width="1.4"/>
  <text x="476" y="122" font-size="13" fill="#825f27" text-anchor="start">bond (locked)</text>

  <!-- muted leader to breach note -->
  <line x1="220" y1="105" x2="300" y2="100" stroke="#726c60" stroke-width="1.4"/>
  <text x="305" y="100" font-size="12" fill="#726c60" text-anchor="start" dominant-baseline="middle">would breach</text>

  <!-- right rule box -->
  <rect x="330" y="188" width="230" height="40" fill="none" stroke="#1b1a16" stroke-width="1.4" rx="2"/>
  <text x="445" y="208" font-size="13" fill="#1b1a16" text-anchor="middle" dominant-baseline="middle">sum of open exposure ≤ bond</text>
</svg>